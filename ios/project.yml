name: Unfilter
options:
  bundleIdPrefix: com.unfilter
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"  # iPhone only
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    # Camera & Photo permissions
    INFOPLIST_KEY_NSCameraUsageDescription: "Unfilter uses your camera to demonstrate how digital smoothing changes photos. Your photo is processed on this device only and is never uploaded."
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Select a photo to see how filters alter its appearance. The photo stays on your device."

targets:
  Unfilter:
    type: application
    platform: iOS
    sources:
      - path: Unfilter
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.unfilter.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: ""  # Fill in your team ID
    info:
      path: Unfilter/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
